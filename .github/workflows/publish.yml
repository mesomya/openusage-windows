name: Publish (Windows)

# Builds the Windows installer (NSIS) and updater manifest, then attaches them
# to a GitHub release. Triggered by pushing a vMAJOR.MINOR.PATCH tag.
#
# Required repository secrets for signed auto-updates (optional but recommended):
#   TAURI_SIGNING_PRIVATE_KEY           contents of the minisign private key
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  its password (empty string if none)
# Generate a key pair with: npm run tauri signer generate -- -w openusage.key

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    env:
      RELEASE_TAG: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - run: npm ci

      - name: Bundle plugins
        run: npm run bundle:plugins

      - name: Verify bundled plugins
        shell: bash
        run: |
          COUNT=$(find src-tauri/resources/bundled_plugins -maxdepth 2 -name plugin.json | wc -l | tr -d ' ')
          if [[ "$COUNT" -lt 1 ]]; then
            echo "No bundled plugins found under src-tauri/resources/bundled_plugins."
            exit 1
          fi

      - name: Validate release tag and versions
        shell: bash
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid RELEASE_TAG: $RELEASE_TAG (expected vMAJOR.MINOR.PATCH)"
            exit 1
          fi
          TAG_VERSION="${RELEASE_TAG#v}"
          TAURI_CONF_VERSION=$(node -p 'require("./src-tauri/tauri.conf.json").version')
          CARGO_VERSION=$(awk -F'"' '/^version =/ { print $2; exit }' ./src-tauri/Cargo.toml)
          PKG_VERSION=$(node -p 'require("./package.json").version')
          for pair in "tauri.conf.json:$TAURI_CONF_VERSION" "Cargo.toml:$CARGO_VERSION" "package.json:$PKG_VERSION"; do
            name="${pair%%:*}"; ver="${pair#*:}"
            if [[ "$ver" != "$TAG_VERSION" ]]; then
              echo "$name version ($ver) != tag version ($TAG_VERSION)"
              exit 1
            fi
          done

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: ${{ env.RELEASE_TAG }}
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: --bundles nsis

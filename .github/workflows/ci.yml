name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: Build & Test (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - run: npm ci

      - name: Bundle plugins
        run: npm run bundle:plugins

      - name: Type-check & build frontend
        run: npm run build

      - name: Frontend tests
        run: npm test

      - name: Rust check
        working-directory: src-tauri
        run: cargo check

      - name: Rust tests
        working-directory: src-tauri
        run: cargo test
